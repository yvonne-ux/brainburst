<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBurst</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">

<div class="blobs">
  <div class="blob"></div><div class="blob"></div>
  <div class="blob"></div><div class="blob"></div>
</div>

<div class="auth-container">

  <div class="mascot-wrap">
    <img src="/static/img/dog.png" alt="BrainBurst mascot" class="mascot-img">
  </div>

  <div class="logo-area">
    <h1>BrainBurst</h1>
    <p class="tagline">Quiz your way to the top</p>
  </div>

  <div class="auth-tabs">
    <button class="tab-btn active" onclick="showTab('login')">Log in</button>
    <button class="tab-btn" onclick="showTab('register')">New here?</button>
  </div>

  <div id="login-form" class="auth-form">
    <input type="text" id="login-username" placeholder="Your username" class="input-field">
    <input type="password" id="login-password" placeholder="Your password" class="input-field">
    <button class="btn btn-primary" onclick="doLogin()">Let's go!</button>
    <div id="login-error" class="error-msg"></div>
  </div>

  <div id="register-form" class="auth-form hidden">
    <input type="text" id="reg-username" placeholder="Pick a cool username" class="input-field">
    <input type="password" id="reg-password" placeholder="Make a password" class="input-field">
    <input type="password" id="reg-confirm" placeholder="Type it again" class="input-field">
    <button class="btn btn-primary" onclick="doRegister()">Join the fun!</button>
    <div id="reg-error" class="error-msg"></div>
  </div>

</div>

<script>
function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
  event.target.classList.add('active');
  document.getElementById(tab + '-form').classList.remove('hidden');
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  const res = await fetch('/login', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password})
  });
  const data = await res.json();
  if (data.ok) { window.location = '/dashboard'; }
  else { err.textContent = data.error; }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  const err = document.getElementById('reg-error');
  err.textContent = '';
  if (password !== confirm) { err.textContent = "Passwords don't match!"; return; }
  if (username.length < 3) { err.textContent = 'Username too short!'; return; }
  const res = await fetch('/register', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password})
  });
  const data = await res.json();
  if (data.ok) { window.location = '/dashboard'; }
  else { err.textContent = data.error; }
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const activeForm = document.querySelector('.auth-form:not(.hidden)');
  if (activeForm.id === 'login-form') doLogin();
  else doRegister();
});
</script>
</body>
</html>
